<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Emerald glow circle (decorative) -->
  <circle cx="900" cy="315" r="200" fill="#10b981" opacity="0.06" filter="url(#glow)"/>

  <!-- Speech bubble icon (larger version of logo) -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="96" height="96" rx="18" fill="#0a0a0a" stroke="rgba(16,185,129,0.3)" stroke-width="2"/>
    <rect x="18" y="14" width="60" height="42" rx="6" fill="#10b981"/>
    <polygon points="24,56 42,56 24,74" fill="#10b981"/>
    <text x="48" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0a0a0a" text-anchor="middle">?</text>
    <circle cx="33" cy="84" r="4.5" fill="#059669"/>
    <circle cx="48" cy="84" r="4.5" fill="#059669"/>
    <circle cx="63" cy="84" r="4.5" fill="#059669"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#f0f0f0">Frag</tspan><tspan fill="#10b981">SMS</tspan>
  </text>

  <!-- Tagline -->
  <text x="82" y="330" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="36" font-weight="400" fill="#888888" letter-spacing="-0.5">
    Dein KI-Assistent per SMS
  </text>

  <!-- Feature pills -->
  <g transform="translate(82, 380)">
    <!-- Pill: DSGVO -->
    <rect x="0" y="0" width="170" height="44" rx="22" fill="none" stroke="#242424" stroke-width="1.5"/>
    <text x="85" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" font-weight="600" fill="#10b981" text-anchor="middle">100% DSGVO</text>

    <!-- Pill: Kein App -->
    <rect x="190" y="0" width="160" height="44" rx="22" fill="none" stroke="#242424" stroke-width="1.5"/>
    <text x="270" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" font-weight="600" fill="#10b981" text-anchor="middle">Kein App</text>

    <!-- Pill: Ab 0 Euro -->
    <rect x="370" y="0" width="170" height="44" rx="22" fill="none" stroke="#242424" stroke-width="1.5"/>
    <text x="455" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" font-weight="600" fill="#10b981" text-anchor="middle">Ab 0 Euro</text>
  </g>

  <!-- Phone mockup (right side) -->
  <g transform="translate(750, 100)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="300" height="430" rx="28" fill="#161616" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Screen -->
    <rect x="12" y="40" width="276" height="350" rx="4" fill="#111"/>
    <!-- Notch -->
    <rect x="100" y="8" width="100" height="22" rx="11" fill="#0a0a0a"/>

    <!-- SMS bubbles -->
    <!-- Sent (green, right-aligned) -->
    <rect x="120" y="60" width="156" height="40" rx="14" fill="#10b981"/>
    <text x="198" y="85" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="500" fill="#0a0a0a" text-anchor="middle">Was ist Photosynthese?</text>

    <!-- Received (dark, left-aligned) -->
    <rect x="24" y="115" width="220" height="80" rx="14" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="34" y="140" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#e0e0e0">Photosynthese ist der Prozess,</text>
    <text x="34" y="158" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#e0e0e0">bei dem Pflanzen Licht in</text>
    <text x="34" y="176" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#e0e0e0">chemische Energie umwandeln.</text>

    <!-- Sent 2 -->
    <rect x="130" y="215" width="146" height="40" rx="14" fill="#10b981"/>
    <text x="203" y="240" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="500" fill="#0a0a0a" text-anchor="middle">Danke! Und wie?</text>

    <!-- Received 2 -->
    <rect x="24" y="270" width="220" height="60" rx="14" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="34" y="295" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#e0e0e0">Chlorophyll in den Blaettern</text>
    <text x="34" y="313" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#e0e0e0">absorbiert Sonnenlicht...</text>

    <!-- Home bar -->
    <rect x="110" y="405" width="80" height="5" rx="2.5" fill="#333"/>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#emeraldGrad)"/>
</svg>
